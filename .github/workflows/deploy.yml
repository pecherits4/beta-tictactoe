name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            if [ -d ~/beta-tictactoe ]; then
              cd ~/beta-tictactoe && git pull origin main
            else
              git clone https://github.com/pecherits4/beta-tictactoe.git ~/beta-tictactoe
              cd ~/beta-tictactoe
            fi
            npm install
            pm2 restart beta-tictactoe || pm2 start index.js --name beta-tictactoe
